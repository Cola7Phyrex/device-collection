<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#eaf1fb">
    <title>设备管理</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>
    <div class="background-orb orb-3"></div>

    <div class="app-shell">
        <div class="app-header glass-panel">
            <div class="header-eyebrow">Personal Inventory</div>
            <div class="header-row">
                <div>
                    <div class="header-title" id="pageTitle">设备</div>
                    <div class="header-subtitle" id="pageSubtitle">记录你的设备生态与使用状态</div>
                </div>
            </div>
        </div>

        <main class="app-main">
            <section class="page active" id="page-devices">
                <div class="sub-tabs glass-strip" id="deviceFilters">
                    <button class="sub-tab active" type="button" data-filter="all">全部</button>
                    <button class="sub-tab" type="button" data-filter="phone">手机</button>
                    <button class="sub-tab" type="button" data-filter="tablet">平板</button>
                    <button class="sub-tab" type="button" data-filter="computer">电脑</button>
                </div>
                <div class="list-grid" id="devicesList"></div>
            </section>

            <section class="page" id="page-accessories">
                <div class="list-grid" id="accessoriesList"></div>
            </section>

            <section class="page" id="page-subscriptions">
                <div class="list-grid" id="subscriptionsList"></div>
                <div class="summary-box glass-panel">
                    <div class="summary-label">订阅总支出</div>
                    <div class="summary-value" id="subscriptionTotal">¥0</div>
                    <button class="summary-toggle" id="subscriptionToggle" type="button">
                        <span>切换显示</span>
                        <span id="subscriptionToggleText">每月平均</span>
                    </button>
                </div>
            </section>

            <section class="page" id="page-wishlist">
                <div class="list-grid" id="wishlistList"></div>
            </section>

            <section class="page" id="page-data">
                <div class="data-grid">
                    <div class="data-card glass-panel">
                        <div class="data-card-info">
                            <h3>设备总价</h3>
                            <p>所有设备的购买价格总和</p>
                        </div>
                        <div class="data-card-value" id="dataDeviceTotal">¥0</div>
                    </div>
                    <div class="data-card glass-panel">
                        <div class="data-card-info">
                            <h3>配件总价</h3>
                            <p>所有配件的购买价格总和</p>
                        </div>
                        <div class="data-card-value" id="dataAccessoryTotal">¥0</div>
                    </div>
                    <div class="data-card glass-panel">
                        <div class="data-card-info">
                            <h3>订阅年费</h3>
                            <p>所有订阅的年化费用</p>
                        </div>
                        <div class="data-card-value" id="dataSubscriptionTotal">¥0</div>
                    </div>
                    <div class="data-card glass-panel">
                        <div class="data-card-info">
                            <h3>欲购总价</h3>
                            <p>所有欲购项目的价格总和</p>
                        </div>
                        <div class="data-card-value" id="dataWishlistTotal">¥0</div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="action-btn import glass-panel" id="importBtn" type="button">导入数据</button>
                    <button class="action-btn export glass-panel" id="exportBtn" type="button">导出数据</button>
                    <button class="action-btn delete glass-panel" id="deleteAllBtn" type="button">删除数据</button>
                </div>
                <input type="file" id="importFile" class="hidden-file-input" accept=".json">
            </section>
        </main>

        <nav class="tab-bar glass-panel" id="tabBar">
            <button class="tab-item active" type="button" data-page="devices">
                <span class="tab-icon">📱</span>
                <span class="tab-label">设备</span>
            </button>
            <button class="tab-item" type="button" data-page="accessories">
                <span class="tab-icon">🎧</span>
                <span class="tab-label">配件</span>
            </button>
            <button class="tab-item" type="button" data-page="subscriptions">
                <span class="tab-icon">📅</span>
                <span class="tab-label">订阅</span>
            </button>
            <button class="tab-item" type="button" data-page="wishlist">
                <span class="tab-icon">🛒</span>
                <span class="tab-label">欲购</span>
            </button>
            <button class="tab-item" type="button" data-page="data">
                <span class="tab-icon">🌐</span>
                <span class="tab-label">数据</span>
            </button>
        </nav>

        <button class="fab glass-panel" id="fabBtn" type="button" aria-label="添加">+</button>
    </div>

    <div class="modal" id="modal" aria-hidden="true">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">新建设备</span>
                <button class="modal-close" id="modalCloseBtn" type="button" aria-label="关闭">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
